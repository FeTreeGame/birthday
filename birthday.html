<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Happy Birthday!</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
      .ui-btn {
        position: fixed; z-index: 100;
        width: 36px; height: 36px; border: none; border-radius: 8px;
        background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        opacity: 0.6; transition: opacity 0.2s;
      }
      .ui-btn:hover { opacity: 1; }
      .ui-btn svg { width: 20px; height: 20px; fill: #fff; }
      #fs-btn { bottom: 12px; right: 12px; }
      #cam-btn { bottom: 12px; left: 12px; }
    </style>
    <script type="module" crossorigin src="/birthday/assets/birthday-CPgu1TZn.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <button id="cam-btn" class="ui-btn" title="reset camera">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>
    <button id="fs-btn" class="ui-btn" title="fullscreen">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
    <script>
      document.getElementById('fs-btn').addEventListener('click', function() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(function(){});
        } else {
          document.exitFullscreen();
        }
      });
      document.getElementById('cam-btn').addEventListener('click', function() {
        if (window.__resetCamera) window.__resetCamera();
      });
    </script>
  </body>
</html>
